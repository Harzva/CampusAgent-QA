<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CampusQA-Collection Tutorial</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav>
        <strong>CampusQA-Collection</strong>
        <a href="https://github.com/Harzva/CampusQA-Collection">Repository</a>
        <a href="https://github.com/Harzva/CampusQA-Collection/blob/main/docs/ROADMAP.md">Roadmap</a>
      </nav>
      <section>
        <p class="eyebrow">RAG to HyperMemory</p>
        <h1>Compare every method, stage by stage.</h1>
        <p class="lede">
          Select any two versions to see the key controllers, services, routes, and memory layers that changed.
        </p>
      </section>
    </header>

    <main>
      <section class="panel controls">
        <label>
          From
          <select id="from"></select>
        </label>
        <label>
          To
          <select id="to"></select>
        </label>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Capability Delta</h2>
          <div id="delta"></div>
        </article>
        <article class="panel">
          <h2>Code Paths To Inspect</h2>
          <ul id="paths"></ul>
        </article>
      </section>

      <section class="panel">
        <h2>Evolution Timeline</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
